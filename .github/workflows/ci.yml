name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Elixir CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bank_crud_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bank_crud_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      DB_HOST: localhost
      DB_PORT: "5434"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME_TEST: bank_crud_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16.3"
          otp-version: "26.2"

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Prepare database
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Run tests
        run: mix test

  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version in mix.exs
        run: |
          CURRENT_VERSION=$(sed -n 's/.*version: "\([0-9]\+\.[0-9]\+\.[0-9]\+\)".*/\1/p' mix.exs | head -n 1)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "Could not find semantic version in mix.exs"
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          sed -i "s/version: \"$CURRENT_VERSION\"/version: \"$NEXT_VERSION\"/" mix.exs
          echo "NEXT_VERSION=$NEXT_VERSION" >> "$GITHUB_ENV"

      - name: Commit and push version bump
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mix.exs
          git commit -m "chore: bump version to ${NEXT_VERSION} [skip ci]"
          git push
